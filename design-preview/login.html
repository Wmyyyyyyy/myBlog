<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 静心启慧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #5A9672;
      --color-primary-hover: #4A7D5F;
      --color-primary-light: #E8F5ED;
      --color-secondary: #97C9A8;
      --color-accent: #7BAF8E;
      --color-surface: #FFFFFF;
      --color-foreground: #2D3B30;
      --color-muted: #E8F0EB;
      --color-muted-text: #6B7D72;
      --color-border: #C8DCD2;
      --color-border-light: #DDEEE5;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 1px 3px rgba(45,59,48,0.06), 0 1px 2px rgba(45,59,48,0.04);
      --shadow-md: 0 4px 12px rgba(45,59,48,0.08), 0 2px 4px rgba(45,59,48,0.04);
      --shadow-lg: 0 12px 32px rgba(45,59,48,0.10), 0 4px 8px rgba(45,59,48,0.06);
      --shadow-xl: 0 24px 48px rgba(45,59,48,0.12), 0 8px 16px rgba(45,59,48,0.08);
      --font-serif: 'Lora', 'Noto Serif SC', Georgia, serif;
      --font-sans: 'Raleway', 'Noto Sans SC', -apple-system, sans-serif;
      --transition-fast: 150ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: transparent;
      color: var(--color-foreground);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--color-border-light);
      overflow: hidden;
    }
    .auth-card-header {
      padding: 36px 36px 28px;
      text-align: center;
      border-bottom: 1px solid var(--color-border-light);
      background: linear-gradient(180deg, rgba(232,245,237,0.5) 0%, transparent 100%);
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .auth-logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-logo-icon svg { width: 20px; height: 20px; color: white; }
    .auth-logo-text {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--color-foreground);
    }
    .auth-subtitle {
      font-size: 13px;
      color: var(--color-muted-text);
      font-weight: 400;
    }
    .auth-card-body { padding: 28px 36px 36px; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-foreground);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-family: var(--font-sans);
      color: var(--color-foreground);
      background: var(--color-surface);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      outline: none;
    }
    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(90,150,114,0.15);
    }
    .form-input::placeholder { color: var(--color-muted-text); opacity: 0.7; }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-muted-text);
      cursor: pointer;
    }
    .remember-me input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--color-primary);
    }
    .forgot-link {
      font-size: 13px;
      color: var(--color-primary);
      text-decoration: none;
      cursor: pointer;
      transition: color var(--transition-fast);
    }
    .forgot-link:hover { color: var(--color-primary-hover); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-sans);
      transition: all var(--transition-fast);
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(90,150,114,0.30);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(90,150,114,0.40);
    }
    .btn-primary:active { transform: translateY(0); }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--color-muted-text);
    }
    .auth-footer a {
      color: var(--color-primary);
      font-weight: 600;
      transition: color var(--transition-fast);
    }
    .auth-footer a:hover { color: var(--color-accent); }

    .divider-ornament {
      text-align: center;
      margin: 20px 0;
      color: var(--color-border);
      font-size: 18px;
      letter-spacing: 6px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="auth-logo-text">静心启慧</span>
      </div>
      <p class="auth-subtitle">探索智慧 · 静心成长</p>
    </div>
    <div class="auth-card-body">
      <form>
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <input id="username" type="text" class="form-input" placeholder="请输入用户名或邮箱" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input id="password" type="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox">
            <span>记住我</span>
          </label>
          <a class="forgot-link">忘记密码？</a>
        </div>
        <button type="button" class="btn btn-primary">登 录</button>
      </form>
      <div class="auth-footer">
        还没有账号？<a href="#">立即注册</a>
      </div>
      <div class="divider-ornament">✦</div>
      <button class="btn btn-primary" style="background:transparent;color:var(--color-foreground);box-shadow:none;border:1.5px solid var(--color-border);">
        先行浏览
      </button>
    </div>
  </div>
</body>
</html>
